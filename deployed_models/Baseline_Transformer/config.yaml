project:
  name: forex-transformer
  symbol: EURUSD
  timeframe: H1
data:
  raw_input: data/raw_market/EURUSD_H1_20210501_20260331.csv
  processed_dir: data/processed_market
  horizons:
  - 12
  atr_multipliers:
  - 3.0
  val_split_date: '2024-01-01'
  test_split_date: '2025-01-01'
  lookback: 60
model:
  type: Transformer
  target: Target_12h_3.0x_TBM
  batch_size: 64
  params:
    epochs: 50
    learning_rate: 0.0001
    d_model: 64
    nhead: 4
    num_layers: 3
    dim_feedforward: 256
    dropout: 0.1
backtest:
  strategy: ContinuousSignalExecution
  cash: 10000.0
  commission: 0.0001
  v_size: 10000.0
  atr_multiplier: 3.0
  conf_threshold: 0.5