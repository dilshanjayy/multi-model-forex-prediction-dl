project:
  name: nguyen-2024-replication
  symbol: EURUSD
  timeframe: D1
data:
  raw_input: data/raw_market/EURUSD_D1_20140101_20240101.csv
  processed_dir: data/processed_market_d1
  feature_pipeline: nguyen_2024
  lookback: 5
  horizons:
  - 1
  atr_multipliers:
  - 2.0
  val_split_date: '2021-01-01'
  test_split_date: '2023-01-01'
model:
  type: CNN-LSTM
  target: Target_1d_Nguyen
  batch_size: 32
  params:
    epochs: 100
    learning_rate: 0.0005
    weight_decay: 0.001
    cnn_filters_1: 32
    cnn_filters_2: 64
    lstm_units: 50
    kernel_size: 3
    dropout: 0.2
backtest:
  strategy: ContinuousSignalExecution
  cash: 10000.0
  commission: 0.0
  v_size: 10000.0
  atr_multiplier: 2.0
  margin: 0.02
  conf_threshold: 0.35
optimization:
  search_space:
    exit_atr_multiplier:
    - 1.0
    - 4.0
    - 0.5
    conf_threshold:
    - 0.35
    - 0.55
    - 0.05