backtest:
  atr_multiplier: 3.0
  cash: 10000.0
  commission: 0.0001
  conf_threshold: 0.45
  margin: 0.02
  strategy: TripleBarrier
  v_size: 10000.0
data:
  atr_multipliers:
  - 3.0
  feature_pipeline: nguyen_2024
  horizons:
  - 12
  lookback: 120
  processed_dir: data/processed_market_multimodal
  raw_input: data/raw_market/EURUSD_H1_20210501_20260331.csv
  test_split_date: '2025-01-01'
  val_split_date: '2024-01-01'
model:
  batch_size: 64
  modality: MultiModal
  params:
    batch_size: 64
    cnn_filters_1: 32
    cnn_filters_2: 64
    dropout: 0.3
    epochs: 100
    input_dim: 18
    kernel_size: 3
    learning_rate: 5.0e-05
    lookback: 120
    lstm_units: 50
    weight_decay: 0.001
  target: Target_12h_3.0x_TBM
  type: CNN-LSTM
optimization:
  search_space:
    conf_threshold:
    - 0.35
    - 0.6
    - 0.05
    exit_atr_multiplier:
    - 1.0
    - 5.0
    - 0.5
project:
  name: multi-modal-cnnlstm
  symbol: EURUSD
  timeframe: H1
