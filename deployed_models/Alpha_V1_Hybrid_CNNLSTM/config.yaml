backtest:
  atr_multiplier: 2.0
  cash: 10000.0
  commission: 0.0001
  conf_threshold: 0.45
  margin: 0.02
  strategy: TripleBarrier
  v_size: 10000.0
data:
  atr_multipliers:
  - 1.0
  - 1.5
  - 2.0
  - 2.5
  - 3.0
  horizons:
  - 5
  - 12
  - 24
  lookback: 120
  processed_dir: data/processed_market
  raw_input: data/raw_market/EURUSD_H1_20210501_20260331.csv
  test_split_date: '2025-01-01'
  val_split_date: '2024-01-01'
model:
  modality: "MultiModal"
  batch_size: 64
  params:
    batch_size: 64
    cnn_filters_1: 32
    cnn_filters_2: 64
    dropout: 0.3
    epochs: 100
    input_dim: 23  # Keep 23 for actual weights matching
    kernel_size: 3
    learning_rate: 5.0e-05
    lookback: 120
    lstm_units: 50
    weight_decay: 0.001
    loss_function: SentimentWeightedCrossEntropy
  target: Target_24h_2.0x_TBM
  type: CNN-LSTM-Sentiment-Hybrid
optimization:
  search_space:
    conf_threshold:
    - 0.35
    - 0.6
    - 0.05
    exit_atr_multiplier:
    - 1.0
    - 4.0
    - 0.5
project:
  name: forex-cnnlstm-multimodal
  symbol: EURUSD
  timeframe: H1
  features: ["Technical Indicators", "News Sentiment", "Volume Profile"]
