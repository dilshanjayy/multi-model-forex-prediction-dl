backtest:
  atr_multiplier: 2.0
  cash: 10000.0
  commission: 0.0001
  conf_threshold: 0.55
  margin: 0.02
  strategy: TripleBarrier
  v_size: 10000.0
data:
  atr_multipliers:
  - 1.0
  - 1.5
  - 2.0
  - 2.5
  - 3.0
  horizons:
  - 5
  - 12
  - 24
  lookback: 120
  processed_dir: data/processed_market
  raw_input: data/raw_market/EURUSD_H1_20160410_20260410.csv
  train_split_pct: 0.6
  val_split_pct: 0.2
model:
  batch_size: 64
  params:
    batch_size: 64
    cnn_filters_1: 32
    cnn_filters_2: 64
    dropout: 0.3
    epochs: 100
    input_dim: 36
    kernel_size: 3
    learning_rate: 0.0001
    lookback: 120
    lstm_units: 50
    weight_decay: 0.001
  target: Target_12h_1.5x_TBM
  type: CNN-LSTM
optimization:
  search_space:
    conf_threshold:
    - 0.35
    - 0.5
    - 0.05
    exit_atr_multiplier:
    - 1.0
    - 4.0
    - 0.5
project:
  name: forex-cnnlstm
  symbol: EURUSD
  timeframe: H1
