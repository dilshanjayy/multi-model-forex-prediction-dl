backtest:
  atr_multiplier: 2.0
  cash: 10000.0
  commission: 0.0
  conf_threshold: 0.4
  margin: 0.02
  strategy: TripleBarrier
  v_size: 10000.0
data:
  atr_multipliers:
  - 2.0
  feature_pipeline: nguyen_2024
  horizons:
  - 1
  lookback: 5
  processed_dir: data/processed_market_d1
  raw_input: data/raw_market/EURUSD_D1_20140101_20240101.csv
  test_split_date: '2023-01-01'
  val_split_date: '2021-01-01'
model:
  batch_size: 32
  params:
    batch_size: 32
    cnn_filters_1: 32
    cnn_filters_2: 64
    dropout: 0.2
    epochs: 100
    input_dim: 14
    kernel_size: 3
    learning_rate: 0.0005
    lookback: 5
    lstm_units: 50
    weight_decay: 0.001
  target: Target_1d_Nguyen
  type: CNN-LSTM
optimization:
  search_space:
    conf_threshold:
    - 0.35
    - 0.55
    - 0.05
    exit_atr_multiplier:
    - 1.0
    - 4.0
    - 0.5
project:
  name: nguyen-2024-replication
  symbol: EURUSD
  timeframe: D1
