backtest:
  atr_multiplier: 3.0
  cash: 10000.0
  commission: 0.0001
  conf_threshold: 0.5
  margin: 0.02
  strategy: TripleBarrier
  v_size: 10000.0
data:
  atr_multipliers:
  - 3.0
  horizons:
  - 12
  lookback: 60
  processed_dir: data/processed_market
  raw_input: data/raw_market/EURUSD_H1_20210501_20260331.csv
  test_split_date: '2025-01-01'
  val_split_date: '2024-01-01'
model:
  batch_size: 64
  params:
    batch_size: 64
    dropout: 0.2
    epochs: 50
    hidden_dim: 128
    input_dim: 36
    learning_rate: 0.001
    lookback: 60
    n_layers: 2
  target: Target_12h_3.0x_TBM
  type: LSTM
optimization:
  search_space:
    conf_threshold:
    - 0.35
    - 0.6
    - 0.05
    exit_atr_multiplier:
    - 1.0
    - 4.0
    - 0.5
project:
  name: forex-lstm
  symbol: EURUSD
  timeframe: H1
